name: Deploy Website
on:
  push:
    branches:
      - main
jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
    - name: Get latest code
      uses: actions/checkout@v3

    - name: Install Dependencies
      # We add 'working-directory' because your package.json is inside the 'rfci' folder
      run: npm install
      working-directory: ./rfci

    - name: Build Project
      # This ensures Vite builds from the correct sub-directory
      run: npm run build
      working-directory: ./rfci

    - name: Sync Files
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        # Updated path to match where Vite actually puts the files
        local-dir: ./rfci/dist/
        server-dir: ./public_html/